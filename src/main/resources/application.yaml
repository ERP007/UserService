server:
  port: ${SERVICE_PORT}

spring:
  config:
    import: optional:file:.env[.properties]

  application:
    name: UserService

  datasource:
    url: jdbc:postgresql://${DB_HOST}:5432/${DB_NAME}
    username: ${DB_USER_NAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI}

keycloak:
  admin:
    server-url: ${KEYCLOAK_SERVER_URL:http://localhost:9001}
    realm: ${KEYCLOAK_REALM:master}
    client-id: ${KEYCLOAK_ADMIN_CLIENT_ID:erp-client}
    client-secret: ${KEYCLOAK_ADMIN_CLIENT_SECRET}

logging:
  level:
    com.fallguys.userservice.infrastructure.client.KeycloakUserIdentityManager: DEBUG